<!DOCTYPE html>
<html lang='de'>
	<head>
		<h3>Revox Receiver<br>B285/B286</h3>
		<title>Revox CD Remote</title>
		<link rel='stylesheet' href='style.css'>
		<script src='script.js'></script>
		<link rel="icon" type="image/x-icon" href="/favicon.ico">
	</head>

	<body>
		<div class='button-group-container-dev span2'>
        <span class='button-group-title-dev'>Ger&auml;teauswahl</span>
		<a href='tape1.html'><button id='tape1' name='page' class='button span1'>Tape1</button></a>
		<a href='tape2.html'><button id='tape2' name='page' class='button span1'>Tape2</button></a>
		<a href='tuner.html'><button id='tuner' name='page' class='button span1'>Tuner</button></a>
		<a href='phono.html'><button id='phono' name='page' class='button span1'>Phono</button></a>
		<a href='cd.html'><button id='cdplayer' name='page' class='button span1'>CD</button></a>
		<a href='index.html'><button id='amplifier' name='page' class='button span1'>Amplifier</button></a>
		<a href='b203.html'><button id='b203' name='page' class='button span1'>B203</button></a>
		</div>

		<div class="tab">
			<button class="tablinks active" onclick="openB203(event, 'B285tab')">Control</button>
			<button class="tablinks" onclick="openB203(event, 'B285Statustab')">Status</button>
		</div>

		<div id="B285tab" class="tabcontent" style="display:block">
		
			<div class='button-pwr-container-dev span2'>
				<p><button name='button'id='recvpoweroff' class='power_btn span12 pwr_color'>OFF</button></p>
			</div>

   			<div class='button-group-container-dev span2'>
				<p><button name='button' id='recv1' class='button span3'>1</button></p>
				<p><button name='button' id='recv2' class='button span3'>2</button></p>
				<p><button name='button' id='recv3' class='button span3'>3</button></p>
				<p><button name='button' id='recv4' class='button span3'>4</button></p>
				<p><button name='button' id='recv5' class='button span3'>5</button></p>
				<p><button name='button' id='recv6' class='button span3'>6</button></p>
				<p><button name='button' id='recv7' class='button span3'>7</button></p>
				<p><button name='button' id='recv8' class='button span3'>8</button></p>
				<p><button name='button' id='recv9' class='button span3'>9</button></p>
				<p><button name='button' id='recv10' class='button span3'>10</button></p>
				<p><button name='button' id='recv11' class='button span3'>11</button></p>
				<p><button name='button' id='recv12' class='button span3'>12</button></p>
				<p><button name='button' id='recv13' class='button span3'>13</button></p>
				<p><button name='button' id='recv14' class='button span3'>14</button></p>
				<p><button name='button' id='recv15' class='button span3'>15</button></p>
				<p><button name='button' id='recv16' class='button span3'>16</button></p>
				<p><button name='button' id='recv17' class='button span3'>17</button></p>
				<p><button name='button' id='recv18' class='button span3'>18</button></p>
				<p><button name='button' id='recv19' class='button span3'>19</button></p>
				<p><button name='button' id='recv20' class='button span3'>20</button></p>
				<p><button name='button' id='recv21' class='button span3'>21</button></p>
				<p><button name='button' id='recv22' class='button span3'>22</button></p>
				<p><button name='button' id='recv23' class='button span3'>23</button></p>
				<p><button name='button' id='recv24' class='button span3'>24</button></p>
				<p><button name='button' id='recv25' class='button span3'>25</button></p>
				<p><button name='button' id='recv26' class='button span3'>26</button></p>
				<p><button name='button' id='recv27' class='button span3'>27</button></p>
				<p><button name='button' id='recv28' class='button span3'>28</button></p>
				<p><button name='button' id='recv29' class='button span3'>29</button></p>
	    	</div>

			<div class='button-group-container-dev span2'>
				<p><button name='button' id='recvscannext' class='button span6'>Scan next ></button></p>
				<p><button name='button' id='recventer' class='button span6'>Enter</button></p>
				<p><button name='button' id='recvvoldn' class='button span6'>Volume -</button></p>
				<p><button name='button' id='recvvolup' class='button span6'>Volume +</button></p>
				<label for="volumeSlider" class="slide-label">Lautst&auml;rke:</label>
				<input type="range" min="0" max="99" value="50" id="volumeSlider" name="volSlider" class='slide'>

				
			<div class='select-group-container span2'>
				<label for="getspeakers">Lautsprecher:</label>
				<select class="b203set" id='getspeakers' name="speakers">
				<option value="L0">Lautsprecher aus</option>
  				<option value="L1">Lautsprecher A</option>
				<option value="L2">Lautsprecher B</option>
				<option value="L3">Lautsprecher A & B</option>
				</select>
			</div>

			</div>
		
			<div class='button-group-container-dev span2'>
				<p><button name='button' id='recvtape1' class='button span4'>Tape1</button></p>
				<p><button name='button' id='recvtape2' class='button span4'>Tape2</button></p>
				<p><button name='button' id='recvphono' class='button span4'>Phono</button></p>
				<p><button name='button' id='recvcd' class='button span4'>CD</button></p>
				<p><button name='button' id='recvtapemon1' class='button span4'>Tape Mon 1</button></p>
				<p><button name='button' id='recvtapemon2' class='button span4'>Tape Mon 2</button></p>
				<p><button name='button' id='recvtone' class='button span4'>Tone control</button></p>
				<p><button name='button' id='recvloudness' class='button span4'>Loudness</button></p>
				<p><button name='button' id='recv20db' class='button span4'>-20dB</button></p>
			</div>

			<div class='button-group-container-dev span2'>
				<p><button name='button' id='recvbal_r' class='button span6'>Balance R</button></p>
				<p><button name='button' id='recvbal_l' class='button span6'>Balance L</button></p>
				<p><button name='button' id='recvvoldn' class='button span6'>Volume -</button></p>
				<p><button name='button' id='recvvolup' class='button span6'>Volume +</button></p>
			</div>

			<div class='button-group-container-misc span2'>
				<p><button name='button' id='recvspeakersa' class='misc_button span4'>Speakers A</button></p>
				<p><button name='button' id='recvspeakersb' class='misc_button span4'>SpeakersB</button></p>
				<p><button name='button' id='recvstore' class='misc_button span4'>Store</button></p>
				<p><button name='button' id='recvmono' class='misc_button span4'>Mono</button></p>
				<p><button name='button' id='recvmute' class='misc_button span4'>Muting</button></p>
				<p><button name='button' id='recvhighblend' class='misc_button span4'>High Blend</button></p>
				<p><button name='button' id='recvtestmode' class='misc_button span4'>Test Mode</button></p>
			</div>
		</div>

		<div id="B285Statustab" class="tabcontent">
		
			<div class='select-group-container span2'>

				<span class='select-group-title-dev'>Status</span>
		
				<label for="b285source">Signalquelle</label>
				<select class="b203set" id="b285source" name="select" disabled>
	  			<option value="0">Standby</option>
  				<option value="1">Tape 1</option>
  				<option value="2">Tape 2</option>
				<option value="3">Disk</option>
				<option value="4">Phono</option>
				<option value="5">Tuner FM</option>
				<option value="6">Tuner AM</option>
				<option value="7">Monitor Tape 1</option>
				<option value="8">Monitor Tape 2</option>
				<option value="9">Status unerkannt</option>
				</select>
				<label for="speakers">Lautsprecher:</label>
				<select class="b203set" id='speakers' name="select" disabled>
  				<option value="0">Lautsprecher aus</option>
  				<option value="1">Lautsprecher A</option>
				<option value="2">Lautsprecher B</option>
				<option value="3">Lautsprecher A & B</option>
				</select>
				<label for="volume">Volume</label>
				<input type=text id="volume" class="b203set"  value="" disabled>
				<label for="tunerstation">Tuner-Station</label>
				<input type=text id="tunerstation" class="b203set"  value="" disabled>
				<label for="stationid">Stations-Kennung</label>
				<input type=text id="stationid" class="b203set"  value="" disabled>
				<label for="frequency">Frequenz</label>
				<input type=text id="frequency" class="b203set"  value="" disabled>
				<p><button name='getb285settings' id='b285_get' class='set_button span12'>Laden</button></p>
			</div>
		</div>
	</body>
</html>
