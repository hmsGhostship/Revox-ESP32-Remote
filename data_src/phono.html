<!DOCTYPE html>
<html lang='de'>
	<head>
		<h3>Revox Record Player<br>B291</h3>

		<link rel='stylesheet' href='style.css'>
		<script src='script.js'></script>
		<link rel="icon" type="image/x-icon" href="/favicon.ico">
	</head>

	<body>
		<div class='button-group-container-dev span2'>

			<span class='button-group-title-dev'>Ger&auml;teauswahl</span>
			<a href='tape1.html'><button id='tape1' name='page' class='button span1'>Tape1</button></a>
			<a href='tape2.html'><button id='tape2' name='page' class='button span1'>Tape2</button></a>
			<a href='tuner.html'><button id='tuner' name='page' class='button span1'>Tuner</button></a>
			<a href='index.html'><button id='amplifier' name='page' class='button span1'>Amplifier</button></a>
			<a href='cd.html'><button id='cdplayer' name='page' class='button span1'>CD</button></a>
			<a href='receiver.html'><button id='receiver' name='page' class='button span1'>Receiver</button></a>
			<a href='b203.html'><button id='b203' name='page' class='button span1'>B203</button></a>
		</div>
		
		
		

		<div class="tab">
			<button class="tablinks active" onclick="openB203(event, 'B291tab')">Control</button>
			<button class="tablinks" onclick="openB203(event, 'B291Statustab')">Status</button>
		</div>
		
		<div id="B291tab" class="tabcontent" style="display:block">
		<div class='button-pwr-container-dev span2'>
			<p><button name='button' id='phonopoweroff' class='power_btn span12 pwr_color'>OFF</button></p>
		</div>
		
		<div class='button-group-container-dev span2'>
			<p><button name='button' id='phonoback' class='button span6'><</button></p>
			<p><button name='button' id='phonoforw' class='button span6'>></button></p>
			<p><button name='button' id='phonovoldn' class='button span6'>Volume -</button></p>
			<p><button name='button' id='phonovolup' class='button span6'>Volume +</button></p>
			<p><button name='button' id='phonolift' class='button span6'><></button></p>
		</div>
		</div>
		
		<div id="B291Statustab" class="tabcontent">

<div class='select-group-container span2'>

				<span class='select-group-title-dev'>Status</span>
		
				<label for="b291speed">Ger&auml;te-Status</label>
				<select class="b203set" id="b291sspeed" name="select" disabled>
	  			<option value="0">33 norm</option>
  				<option value="1">45 norm</option>
  				<option value="2">33 spec</option>
				<option value="3">45 spec</option>
				</select>

				<label for="b291state">Ger&auml;te-Status</label>
				<select class="b203set" id="b291state" name="select" disabled>
	  			<option value="0">Play</option>
  				<option value="2">Pause</option>
  				<option value="3">Stop/Pause</option>
				<option value="6">Returning</option>
				<option value="A">Returning</option>
				</select>
				
				<p><button name='getb226settings' id='b226_get' class='set_button span12'>Laden</button></p>
			</div>

		<p><button name='getb291settings' id='b291_get' class='set_button span12'>Laden</button></p>

		</div>

	</body>
